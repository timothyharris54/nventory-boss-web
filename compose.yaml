name: nventory-boss

x-api-environment: &api-environment
  NODE_ENV: production
  PORT: 3000
  DATABASE_URL: postgresql://nventory:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/nventory
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
  APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
  PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
  EMAIL_FROM: ${EMAIL_FROM:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}

x-api-build: &api-build
  context: ../stockpilot-api
  dockerfile: ../nventory-boss-web/docker/api.Dockerfile

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nventory
      POSTGRES_USER: nventory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nventory -d nventory"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - internal

  migrate:
    build: *api-build
    environment: *api-environment
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  api:
    build: *api-build
    restart: unless-stopped
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    networks:
      - internal

  web:
    build:
      context: .
    restart: unless-stopped
    environment:
      API_UPSTREAM: http://api:3000
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
